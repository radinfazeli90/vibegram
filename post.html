<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>

    <style>
        body{
            margin:0;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
            background:#f5f5f7;
        }

        .container{
            max-width:500px;
            margin:40px auto;
            background:white;
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        textarea{
            width:100%;
            height:120px;
            border:1px solid #ddd;
            border-radius:12px;
            padding:15px;
            resize:none;
            font-size:15px;
            box-sizing:border-box;
        }

        .upload-box{
            margin-top:15px;
            border:2px dashed #ccc;
            border-radius:15px;
            padding:20px;
            text-align:center;
            color:#777;
        }

        input[type=file]{
            margin-top:10px;
        }

        button{
            width:100%;
            margin-top:20px;
            border:none;
            padding:14px;
            border-radius:12px;
            background:#0095f6;
            color:white;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            opacity:.9;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#0095f6;
        }

        .hint{
            font-size:12px;
            color:#aaa;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Create New Post</h2>

    <form method="post" action="/post/{{ username }}" enctype="multipart/form-data">

        <textarea name="text" placeholder="What's on your mind?"></textarea>

        <div class="upload-box">
            📷 Upload Photo
            <br>
            <input type="file" name="photo">

            <div class="hint">
                فقط عکس فعلاً ساپورت میشه (ویدیو بعداً اضافه می‌کنیم)
            </div>
        </div>

        <button type="submit">
            Share Post
        </button>

    </form>

    <a class="back" href="/feed/{{ username }}">
        ← Back to Feed
    </a>

</div>

</body>
</html>
