<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
            background: #fafafa;
            margin: 0;
        }

        .top {
            background: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .profile {
            background: white;
            padding: 20px;
            text-align: center;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #ddd;
            margin: auto;
            margin-bottom: 10px;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .username {
            font-size: 13px;
            color: gray;
            margin-bottom: 10px;
        }

        .posts-title {
            margin: 15px;
            font-weight: bold;
        }

        .post {
            background: white;
            margin: 10px auto;
            width: 90%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .text {
            margin-bottom: 8px;
        }

        .like {
            font-size: 12px;
            color: #0095f6;
        }
    </style>
</head>

<body>

<div class="top">
    Profile
</div>

<div class="profile">

    <div class="avatar"></div>

    <div class="name">
        {{ username }}
    </div>

    <div class="username">
        @{{ username }}
    </div>

</div>

<div class="posts-title">
    Posts
</div>

{% for p in posts %}
    <div class="post">

        <div class="text">{{ p.text }}</div>

        <div class="like">
            ♥ {{ p.likes }} likes
        </div>

    </div>
{% endfor %}

</body>
</html>
