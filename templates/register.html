<!DOCTYPE html>
<html>
<head>
    <title>VibeGram</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
            background: linear-gradient(135deg, #f5f7fa, #e6f0ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 340px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .title {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .title span {
            color: #0095f6;
        }

        .desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: #0095f6;
            box-shadow: 0 0 5px rgba(0,149,246,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #0095f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #007cd1;
        }

        .links {
            margin-top: 12px;
            font-size: 12px;
        }

        .links a {
            color: #0095f6;
            text-decoration: none;
            margin: 0 5px;
        }

        .small {
            margin-top: 15px;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="title">
        Vibe<span>Gram</span>
    </div>

    <div class="desc">
        Welcome back. Please login to continue.
    </div>

    <form action="/go" method="post">

        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Log In</button>

    </form>

    <div class="links">
        <a href="#">Forgot password?</a>
        <a href="/signup">Sign up</a>
    </div>

    <div class="small">
        By continuing you agree to our Terms & Privacy Policy
    </div>

</div>

</body>
</html>
