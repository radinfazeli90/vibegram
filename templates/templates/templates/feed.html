<!DOCTYPE html>
<html>
<head>
    <title>VibeGram Feed</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
            background: #f3f4f6;
            margin: 0;
            padding-bottom: 80px;
        }

        .top {
            background: white;
            padding: 14px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .container {
            width: 420px;
            margin: auto;
            margin-top: 20px;
        }

        .post {
            background: white;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            border: 1px solid #eee;
        }

        .post-text {
            font-size: 15px;
            margin-bottom: 10px;
        }

        .like {
            font-size: 13px;
            color: #0095f6;
            text-decoration: none;
            font-weight: bold;
        }

        .like:hover {
            opacity: 0.7;
        }

        /* Bottom Nav */
        .bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav {
            text-align: center;
            font-size: 12px;
            color: #333;
            text-decoration: none;
        }

        .icon {
            font-size: 20px;
            display: block;
            margin-bottom: 3px;
        }
    </style>
</head>

<body>

<div class="top">
    VibeGram 
</div>

<div class="container">

    {% for p in posts %}
        <div class="post">
            <div class="post-text">{{ p.text }}</div>

            <a class="like" href="/like/{{ username }}/{{ loop.index0 }}">
                ♥ Like ({{ p.likes }})
            </a>
        </div>
    {% endfor %}

</div>

<!-- Bottom Nav -->
<div class="bottom">

    <a class="nav" href="/feed/{{ username }}">
        <span class="icon">⌂</span>
        Home
    </a>

    <a class="nav" href="/post/{{ username }}">
        <span class="icon">＋</span>
        Post
    </a>

    <a class="nav" href="/profile/{{ username }}">
        <span class="icon">👤</span>
        Profile
    </a>

</div>

</body>
</html>
