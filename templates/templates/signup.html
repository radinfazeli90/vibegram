<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 360px;
            background: white;
            border: 1px solid #dbdbdb;
            padding: 40px;
            text-align: center;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border: 1px solid #dbdbdb;
            border-radius: 5px;
            background: #fafafa;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #00c6ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0095f6;
        }

        .links {
            margin-top: 15px;
        }

        a {
            color: #0095f6;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="brand">
        Vibe<span style="color:#0095f6;">Gram</span> 
    </div>

    <div class="desc">
        Create your account to start sharing moments.
    </div>

    <form action="/signup" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Sign Up</button>
    </form>

    <div class="links">
        <a href="/">Back to home</a>
    </div>

</div>

</body>
</html>
